<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Tip Calculator</title>
</head>
<body class="min-h-screen bg-gray-200 flex items-center justify-center text-gray-500">
    <div class="max-w-sm w-full bg-white rounded-2xl p-6">
        <main >
            <h1 class="text-gray-700 font-semibold text-2xl text-center m-7">Calculate your Tip</h1>
            <section>
                <div>
                    <p>Bill Amount ($)</p>
                    <input id="bill" type="number" placeholder="Enter Bill amount" class="border-2  rounded-xl w-full p-2 text-xl">
                </div>
                <div>
                    <p>Number of People</p>
                    <input id="people" type="number" placeholder="Enter No. of people" class="border-2 rounded-xl w-full p-2 text-xl">
                </div>
            </section>
            <section class="border-b-2 border-gray-200 m-3">
                <h2>Select Tip % </h2>
                <article >
                    <div class="grid grid-cols-3 m-2">
                        <button class="tip-btn" data-tip="5">5%</button>                 
                        <button class="tip-btn" data-tip="10">10%</button>                 
                        <button class="tip-btn" data-tip="15">15%</button>                 
                        <button class="tip-btn" data-tip="20">20%</button>                 
                        <button class="tip-btn" data-tip="25">25%</button>                 
                        <button class="tip-btn" data-tip="custom">custom</button>                 
                    </div>
                    <div >
                        <input id="custom" type="number" placeholder="Enter custom Tip" class="border-2 mb-2 rounded-xl w-full p-2 text-xl transition duration-300 hidecustom">
                    </div>
                    
                </article>
            </section>
            <section>
                <div class="flex justify-between items-center py-2">
                    <h3>Tip Amount / Person</h3>
                    <span id="tip-per-person" class="text-blue-700 font-semibold">0$</span>
                </div>
                <div class="flex justify-between items-center py-2">
                    <h3>Total / Person</h3>
                    <span id="total-per-person" class="text-blue-700 font-semibold" >0$</span>
                </div>
                <div class="flex justify-between items-center py-2">
                    <h3>Total Bill</h3>
                    <span id="total-bill" class="text-xl text-gray-800 font-semibold">0$</span>
                </div>
                <div class="mb-4">
                    <button id="calculate" class="text-gray-700 font-semibold border-2  rounded-xl w-full p-2 text-xl cursor-pointer">Calculate</button>
                    
                </div>
                <div class="mb-2">
                    <button id="reset" class="text-gray-700 font-semibold border-2  rounded-xl w-full p-2 text-xl cursor-pointer" >Reset</button>
                </div>
            </section>

        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
