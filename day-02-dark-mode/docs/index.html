<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <title>Dark-mode</title>
</head>
<body id="app" class="bg-gray-200 dark:bg-gray-800 min-h-screen flex justify-center items-center transition-colors  duration-300">
   <div  class=" bg-gray-100 text-gray-800  max-w-sm w-full p-2 rounded-2xl  dark:bg-gray-700 dark:text-gray-100 transition-colors  duration-300">
    <header class="px-2 py-6 my-6 bg-white rounded-xl shadow-xl dark:bg-gray-700 transition-colors duration-300">
        <nav class="flex justify-between items-center ">
            <a class="font-semibold text-2xl " href="/">My App</a>
            <button id="moon" class="flex items-center cursor-pointer dark:hidden text-xl font-semibold border-gray-600 border-2 px-6 py-2 rounded-2xl text-center" >
               <span  class="mr-2" > <i class="fa-solid fa-moon  " ></i></span>
                Dark
            </button>
            <button id="sun" class="hidden dark:flex items-center cursor-pointer text-xl font-semibold border-gray-600 border-2 px-6 py-2 rounded-2xl  text-center transition duration-300 dark:bg-gray-800/30 dark:border-0 dark:text-gray-100/35 hover:bg-gray-100 hover:text-gray-700" >
              <span  class= "mr-2" > <i class="fa-solid fa-sun "></i></span>
                light
            </button>
        </nav>
    </header>
      <main  >
        <section class="text-center my-6 transition-colors  duration-300">
            <h1 class="text-2xl font-bold ">Welcome to My App</h1>
            <p class="dark:text-gray-400 transition-colors  duration-300">A simple App with dark mode support</p>
        </section>
    
         <section class="px-2 py-6 my-6 bg-white rounded-xl shadow-xl tracking-wide leading-relaxed dark:bg-gray-700 transition-colors  duration-300">
                <h3 class="text-xl font-semibold">About</h3>
                <p class="dark:text-gray-400">This is a sample card. Click the toggle button in the navbar to switch between light and dark mode.</p>
         </section>
         <section class="px-2 py-6 my-6 bg-white rounded-xl shadow-xl tracking-wide leading-relaxed dark:bg-gray-700 transition-colors  duration-300">
                <h3 class="text-xl font-semibold">Features</h3>
                <p class="dark:text-gray-400">Smooth transitions, persistent toggle, clean design.</p>
         </section>

       
    
    </main>
   </div>
  <script src="main.js"></script>
   </body>
</html>
